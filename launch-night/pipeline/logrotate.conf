# /etc/logrotate.d/thunderstorm-stream
#
# 14 daily rotations, compressed. copytruncate avoids HUPing ffmpeg —
# the supervisor appends to stream.log via `tee -a`, which reopens on each
# write so a rotated-out file is fine, but ffmpeg's own stderr (>> redirect)
# holds an fd to the inode. copytruncate is the simplest fix.

/var/log/thunderstorm-stream/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y%m%d
    su atlas atlas
    create 0640 atlas atlas
}
